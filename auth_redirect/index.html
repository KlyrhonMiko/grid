<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <style>
    body {
      background: #0d1015;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #3797ef;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 20px; margin: 0 0 8px; }
    p { color: rgba(255,255,255,.5); font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
    .code-box {
      background: #1c1c1e;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      word-break: break-all;
      font-family: monospace;
      font-size: 14px;
      color: #fff;
      user-select: all;
      -webkit-user-select: all;
      border: 1px solid rgba(255,255,255,.1);
    }
    button {
      background: #3797ef;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.8; }
    .success { color: #4ade80; font-size: 13px; margin-top: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening the app…</p>
    </div>
    <div id="fallback" class="hidden">
      <h2>Authorization Successful</h2>
      <p>Copy the code below and paste it in the app.</p>
      <div class="code-box" id="code-display"></div>
      <button id="copy-btn">Copy Code</button>
      <div class="success hidden" id="copied-msg">Copied! Switch back to the app.</div>
    </div>
    <div id="error-view" class="hidden"></div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var error = params.get("error");

      if (!code) {
        document.getElementById("loading").classList.add("hidden");
        var ev = document.getElementById("error-view");
        ev.classList.remove("hidden");
        ev.innerHTML = error
          ? "<h2>Authorization Failed</h2><p>" + error + "</p>"
          : "<h2>No Code Received</h2><p>Please try again from the app.</p>";
        return;
      }

      // Remove code from URL so back/reload won't re-trigger
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, "", window.location.pathname);
      }

      var encodedCode = encodeURIComponent(code);

      // Android Chrome: use intent:// URL which is the official way to launch apps
      // iOS: use custom scheme directly
      var isAndroid = /android/i.test(navigator.userAgent);

      if (isAndroid) {
        window.location.href =
          "intent://callback?code=" + encodedCode +
          "#Intent;scheme=grid;package=com.example.grid;end";
      } else {
        window.location.href = "grid://callback?code=" + encodedCode;
      }

      // Show manual fallback after 3 seconds if page is still visible
      setTimeout(function () {
        document.getElementById("loading").classList.add("hidden");
        var fb = document.getElementById("fallback");
        fb.classList.remove("hidden");
        document.getElementById("code-display").textContent = code;

        document.getElementById("copy-btn").addEventListener("click", function () {
          navigator.clipboard.writeText(code).then(function () {
            document.getElementById("copied-msg").classList.remove("hidden");
            document.getElementById("copy-btn").textContent = "Copied!";
          }).catch(function () {
            var range = document.createRange();
            range.selectNodeContents(document.getElementById("code-display"));
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          });
        });
      }, 3000);
    })();
  </script>
</body>
</html>
