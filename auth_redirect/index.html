<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <style>
    body {
      background: #0d1015;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #3797ef;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,.6); font-size: 14px; margin: 0; }
    a { color: #3797ef; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <p id="msg">Redirecting back to the app…</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var error = params.get("error");

      if (code) {
        var appUrl = "grid://callback?code=" + encodeURIComponent(code);
        window.location.replace(appUrl);

        // Fallback if the redirect doesn't trigger (e.g. desktop browser)
        setTimeout(function () {
          document.getElementById("msg").innerHTML =
            "If the app didn't open, copy this code and paste it in the app:<br><br>" +
            '<strong style="user-select:all;color:#fff">' + code + "</strong>";
        }, 2000);
      } else if (error) {
        document.getElementById("msg").innerHTML =
          "Instagram returned an error: <strong>" + error + "</strong>";
      } else {
        document.getElementById("msg").textContent =
          "No authorization code received.";
      }
    })();
  </script>
</body>
</html>
