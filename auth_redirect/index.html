<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <style>
    body {
      background: #0d1015;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #3797ef;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,.6); font-size: 14px; margin: 0; }
    .code {
      user-select: all;
      color: #fff;
      background: #1c1c1e;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      margin-top: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <p id="msg">Redirecting back to the app…</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var error = params.get("error");

      if (code) {
        // Strip the code from the URL so browser reloads won't re-trigger
        if (window.history && window.history.replaceState) {
          window.history.replaceState(null, "", window.location.pathname);
        }

        // Store code before redirect so fallback can show it
        var savedCode = code;

        // Try opening the app via custom scheme
        window.location.href = "grid://callback?code=" + encodeURIComponent(code);

        // Fallback: show the code for manual entry
        setTimeout(function () {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("msg").innerHTML =
            "If the app didn't open automatically, copy this code and paste it in the app:" +
            '<span class="code">' + savedCode + "</span>";
        }, 1500);
      } else if (error) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").innerHTML =
          "Instagram returned an error: <strong>" + error + "</strong>";
      } else {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").textContent =
          "No authorization code received.";
      }
    })();
  </script>
</body>
</html>
