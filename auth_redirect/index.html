<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <style>
    body {
      background: #0d1015;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 2rem;
      max-width: 340px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #3797ef;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,.6); font-size: 14px; margin: 0; }
    .code {
      user-select: all;
      -webkit-user-select: all;
      color: #fff;
      background: #1c1c1e;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      margin-top: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <p id="msg">Redirecting back to the app…</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var error = params.get("error");

      if (!code) {
        document.getElementById("spinner").style.display = "none";
        if (error) {
          document.getElementById("msg").innerHTML =
            "Instagram returned an error: <strong>" + error + "</strong>";
        } else {
          document.getElementById("msg").textContent =
            "No authorization code received.";
        }
        return;
      }

      // Strip code from URL immediately to prevent redirect loops on reload
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, "", window.location.pathname);
      }

      var isAndroid = /android/i.test(navigator.userAgent);

      if (isAndroid) {
        // Android intent URL — tells Chrome to launch the app and close the tab
        window.location.href =
          "intent://callback?code=" + encodeURIComponent(code) +
          "#Intent;scheme=grid;package=com.example.grid;end";
      } else {
        // iOS and other platforms — use custom scheme directly
        window.location.href = "grid://callback?code=" + encodeURIComponent(code);
      }

      // Fallback: show the code for manual copy-paste
      setTimeout(function () {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("msg").innerHTML =
          "If the app didn't open, copy this code and paste it in the app:" +
          '<span class="code">' + code + "</span>";
      }, 2000);
    })();
  </script>
</body>
</html>
