<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorization Code</title>
  <style>
    body {
      background: #0d1015;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 20px;
      margin: 0 0 8px;
    }
    p {
      color: rgba(255,255,255,.5);
      font-size: 14px;
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .code-box {
      background: #1c1c1e;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      word-break: break-all;
      font-family: monospace;
      font-size: 14px;
      color: #fff;
      user-select: all;
      -webkit-user-select: all;
      cursor: text;
      border: 1px solid rgba(255,255,255,.1);
    }
    button {
      background: #3797ef;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.8; }
    .copied {
      color: #4ade80;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card" id="content"></div>
  <script>
    (function () {
      var el = document.getElementById("content");
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var error = params.get("error");

      if (code) {
        el.innerHTML =
          '<div class="icon">&#10003;</div>' +
          '<h2>Authorization Successful</h2>' +
          '<p>Copy the code below and paste it in the app.</p>' +
          '<div class="code-box" id="code">' + code + '</div>' +
          '<button id="copy-btn">Copy Code</button>' +
          '<div class="copied" id="copied-msg">Copied! Go back to the app.</div>';

        document.getElementById("copy-btn").addEventListener("click", function () {
          navigator.clipboard.writeText(code).then(function () {
            document.getElementById("copied-msg").style.display = "block";
            document.getElementById("copy-btn").textContent = "Copied!";
          }).catch(function () {
            // Fallback: select the text
            var range = document.createRange();
            range.selectNodeContents(document.getElementById("code"));
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          });
        });
      } else if (error) {
        el.innerHTML =
          '<div class="icon">&#10007;</div>' +
          '<h2>Authorization Failed</h2>' +
          '<p class="error">' + error + '</p>';
      } else {
        el.innerHTML =
          '<h2>No Code Received</h2>' +
          '<p>No authorization code was found. Please try again from the app.</p>';
      }
    })();
  </script>
</body>
</html>
